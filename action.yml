name: 'DingTalk Bot Message'
description: 'Send DingTalk bot messages from GitHub Actions'
author: 'Orchardxyz'
branding:
  icon: 'message-square'
  color: 'blue'
inputs:
  dingToken:
    description: 'DingTalk bot token'
    required: true
  body:
    description: 'Post Body to send'
    required: true
  secret:
    description: 'If use sign secret'
    required: false
  ignoreError:
    description: 'If set true, will not fail action when API call failed'
    required: false

runs:
  using: 'node24'
  main: 'dist/index.js'
