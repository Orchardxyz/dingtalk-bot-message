name: Test
on:
  workflow_dispatch:
  push:
    branches:
      - feat/dingtalk-bot-message-release

jobs:
  # test action works running from the graph
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Send DingTalk bot message
      uses: ./
      with:
        dingToken: ${{ secrets.DING_TOKEN }}
        secret: ${{ secrets.DING_SECRET }} # if secret set, action will call API with sign
        body: |
          {
            "msgtype": "link",
            "link": {
                "text": "仓库: ${{ github.repository }} | 分支: ${{ github.ref_name }} | 触发人: ${{ github.actor }} | 事件: ${{ github.event_name }} | Run: #${{ github.run_number }}",
                "title": "GitHub Actions 测试通知 - ${{ github.workflow }}",
                "picUrl": "",
                "messageUrl": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
          }
